<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OASIS - Online Reservation System. Book and manage railway tickets easily.">
  <title>OASIS — Login & Register</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="app-wrapper">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-logo">
          <span class="icon">🚂</span>
          <h1>OASIS</h1>
          <p>Online Reservation System</p>
        </div>

        <!-- Auth Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
        </div>

        <div id="auth-alert"></div>

        <!-- Login Form -->
        <form id="login-form">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" class="form-control" placeholder="Enter your username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <label class="form-check">
            <input type="checkbox" id="remember-me" checked> Remember me
          </label>
          <br>
          <button type="submit" class="btn btn-primary btn-block" id="btn-login">🔐 Sign In</button>
        </form>

        <!-- Register Form (hidden) -->
        <form id="register-form" style="display:none">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="form-control" placeholder="e.g. Rahul Sharma" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" class="form-control" placeholder="Choose a username (min 3 chars)" required minlength="3">
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="Create a password (min 6 chars)" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-register">✨ Create Account</button>
        </form>

        <div class="login-footer">
          <p>Demo account: <strong>admin / admin123</strong></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/particles.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
