<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OASIS - Book a new train reservation.">
  <title>OASIS — Book Ticket</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="app-wrapper" id="app">
    <main class="main-content">
      <div class="page-header">
        <h1>🎫 Book a Ticket</h1>
        <p>Search by train name or find trains between stations.</p>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon">🚂</div>
          <div><h2>Reservation Form</h2><p>Search trains by name or by route</p></div>
        </div>

        <div id="reservation-alert"></div>

        <form id="reservation-form">
          <div class="form-group">
            <label for="passenger_name">Passenger Name</label>
            <input type="text" id="passenger_name" class="form-control" placeholder="Full name as per ID" required>
          </div>

          <!-- Train Search: by name or number -->
          <div class="form-row">
            <div class="form-group autocomplete-wrapper">
              <label for="train_name">Train Name</label>
              <input type="text" id="train_name" class="form-control" placeholder="Type train name e.g. Rajdhani" autocomplete="off">
              <div class="autocomplete-list" id="train-name-dropdown"></div>
            </div>
            <div class="form-group autocomplete-wrapper">
              <label for="train_number">Train Number</label>
              <input type="text" id="train_number" class="form-control" placeholder="e.g. 12301" autocomplete="off">
              <div class="autocomplete-list" id="train-number-dropdown"></div>
            </div>
          </div>

          <!-- Route search -->
          <div class="form-row">
            <div class="form-group autocomplete-wrapper">
              <label for="source">Source Station</label>
              <input type="text" id="source" class="form-control" placeholder="e.g. New Delhi" autocomplete="off">
              <div class="autocomplete-list" id="source-dropdown"></div>
            </div>
            <div class="form-group autocomplete-wrapper">
              <label for="destination">Destination Station</label>
              <input type="text" id="destination" class="form-control" placeholder="e.g. Mumbai" autocomplete="off">
              <div class="autocomplete-list" id="dest-dropdown"></div>
            </div>
          </div>

          <!-- Find trains between stations button -->
          <button type="button" class="btn btn-secondary btn-block" id="btn-find-trains" style="margin-bottom:1.3rem">
            🔍 Find Trains Between Stations
          </button>

          <!-- Train results from route search -->
          <div id="route-results"></div>

          <div class="form-row">
            <div class="form-group">
              <label for="class_type">Class</label>
              <select id="class_type" class="form-control" required disabled>
                <option value="">Select a train first</option>
              </select>
            </div>
            <div class="form-group">
              <label for="journey_date">Journey Date</label>
              <input type="date" id="journey_date" class="form-control" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="btn-book">
            🎫 Confirm Reservation
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="/js/particles.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/reservation.js"></script>
</body>
</html>
